log_level: info        # debug / info / warn / error
log_file: /tmp/loom.log

SSL:
  email: you@example.com
  cloudflare_api_token: your_cloudflare_api_token_here
  certs:
    cert1:
      domains:
        - example.com
        - "*.example.com"
      crt_path: /etc/loom/certs/example.crt
      key_path: /etc/loom/certs/example.key

PortForward:
  server1:
    enable: true
    listen_port: 8080
    forward_address: 127.0.0.1
    forward_port: 9090
  server2:
    enable: false
    listen_port: 3306
    forward_address: 192.168.1.100
    forward_port: 3306

WebServices:
  server1:
    enable: true
    listen_port: 443
    tls_enable: true
    crt_path: /etc/loom/certs/example.crt
    key_path: /etc/loom/certs/example.key
    sub-rule1:
      name: site_a
      enable: true
      front_web: a.example.com
      backend_address: 127.0.0.1
      backend_port: 8001
    sub-rule2:
      name: site_b
      enable: true
      front_web: b.example.com
      backend_address: 127.0.0.1
      backend_port: 8002
  server2:
    enable: true
    listen_port: 8088
    tls_enable: false
    sub-rule1:
      name: internal_app
      enable: true
      front_web: internal.example.com
      backend_address: 127.0.0.1
      backend_port: 3000
